# ═══════════════════════════════════════════════════
# CLASE 1 · application.properties
# Conexión a MySQL de XAMPP + configuración Hibernate
# ═══════════════════════════════════════════════════

# ── CONEXIÓN MYSQL ──────────────────────────────────
# Crea la BD vacía en phpMyAdmin antes de arrancar.
# Hibernate generará las tablas desde las entidades.
server.port=8081
spring.datasource.url=jdbc:mysql://localhost:3306/syntax_error_studios
spring.datasource.username=root
spring.datasource.password=
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect

# ── DDL AUTO ────────────────────────────────────────
# update: crea las tablas si no existen, las actualiza
# si el modelo cambió. Ideal para desarrollo en clase.
spring.jpa.hibernate.ddl-auto=update

# ── MOSTRAR SQL ─────────────────────────────────────
# Muestra en consola el SQL que ejecuta Hibernate.
# Útil para entender qué ocurre internamente.
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ── NOMBRE DE LA APP ────────────────────────────────
spring.application.name=syntax_error_studios
